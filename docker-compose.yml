services:
  db:
    image: postgres:16-alpine
    container_name: tradertrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradertrack}
      POSTGRES_USER: ${POSTGRES_USER:-tradertrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradertrack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradertrack} -d ${POSTGRES_DB:-tradertrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
